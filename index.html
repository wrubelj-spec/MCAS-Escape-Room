<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>8th Grade Science MCAS Escape Room</title>

<style>

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#0f172a;
    color:white;
    overflow:hidden;
}

#game{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    height:100vh;
    padding:20px;
}

.room{
    background:#1e293b;
    border:4px solid #38bdf8;
    border-radius:20px;
    padding:30px;
    width:90%;
    max-width:900px;
    text-align:center;
    box-shadow:0 0 25px black;
}

h1{
    color:#22d3ee;
}

.level{
    color:#facc15;
    font-size:26px;
    margin-bottom:10px;
}

.question{
    font-size:24px;
    margin:20px 0;
    min-height:100px;
}

.answers{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

button{
    padding:15px;
    font-size:18px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    background:#0ea5e9;
    color:white;
    transition:0.2s;
}

button:hover{
    background:#0284c7;
    transform:scale(1.05);
}

#timer{
    font-size:24px;
    color:#fb7185;
    margin-bottom:10px;
}

#score{
    margin-top:15px;
    color:#4ade80;
    font-size:22px;
}

#message{
    margin-top:20px;
    font-size:22px;
    min-height:40px;
}

#startScreen,
#endScreen{
    position:absolute;
    width:100%;
    height:100%;
    background:#020617;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

.bigButton{
    margin-top:20px;
    padding:18px 40px;
    font-size:24px;
    background:#22c55e;
}

.bigButton:hover{
    background:#16a34a;
}

</style>
</head>

<body>

<div id="startScreen">
    <h1>🔬 Worcester Public Schools</h1>
    <h2>8th Grade Science MCAS Escape Room</h2>

    <p>
        Escape every science lab by solving MCAS-style science questions.<br>
        Questions become harder every level!
    </p>

    <button class="bigButton" onclick="startGame()">
        Start Escape Room
    </button>
</div>

<div id="game" style="display:none;">

    <div class="room">

        <div class="level" id="levelDisplay"></div>

        <div id="timer">Time: 120</div>

        <div class="question" id="question"></div>

        <div class="answers" id="answers"></div>

        <div id="message"></div>

        <div id="score"></div>

    </div>

</div>

<div id="endScreen" style="display:none;">

    <h1 id="endTitle"></h1>

    <p id="endMessage"></p>

    <button class="bigButton" onclick="restartGame()">
        Try Again
    </button>

</div>

<script>

const allQuestions = [

{
level:"Level 1: Cells",
question:"Which organelle controls cell activities?",
answers:["Nucleus","Cell membrane","Ribosome","Vacuole"],
correct:0
},

{
level:"Level 1: Cells",
question:"What do chloroplasts do?",
answers:["Store water","Create proteins","Photosynthesis","Digestion"],
correct:2
},

{
level:"Level 1: Cells",
question:"Which organism is unicellular?",
answers:["Human","Bacteria","Tree","Fish"],
correct:1
},

{
level:"Level 1: Cells",
question:"What is the function of the cell membrane?",
answers:["Protection","Photosynthesis","Movement","Digestion"],
correct:0
},

{
level:"Level 1: Cells",
question:"DNA is found inside the:",
answers:["Nucleus","Cytoplasm","Cell wall","Membrane"],
correct:0
},

{
level:"Level 2: Chemistry",
question:"Matter is made of:",
answers:["Cells","Atoms","Energy","Light"],
correct:1
},

{
level:"Level 2: Chemistry",
question:"What happens to particles when heated?",
answers:["Slow down","Move faster","Disappear","Shrink"],
correct:1
},

{
level:"Level 2: Chemistry",
question:"A liquid has:",
answers:["No volume","Definite shape","Definite volume","No mass"],
correct:2
},

{
level:"Level 2: Chemistry",
question:"The pH of a neutral solution is:",
answers:["14","7","1","0"],
correct:1
},

{
level:"Level 2: Chemistry",
question:"Which is a chemical change?",
answers:["Melting ice","Tearing paper","Burning wood","Breaking glass"],
correct:2
},

{
level:"Level 3: Motion",
question:"What force pulls objects toward Earth?",
answers:["Magnetism","Friction","Gravity","Electricity"],
correct:2
},

{
level:"Level 3: Motion",
question:"Balanced forces cause:",
answers:["Acceleration","No change in motion","Explosion","Heat"],
correct:1
},

{
level:"Level 3: Motion",
question:"Speed equals:",
answers:["Mass ÷ force","Distance ÷ time","Force × distance","Weight ÷ time"],
correct:1
},

{
level:"Level 3: Motion",
question:"Friction usually:",
answers:["Speeds objects up","Slows motion","Removes gravity","Adds mass"],
correct:1
},

{
level:"Level 3: Motion",
question:"Which simple machine changes force direction?",
answers:["Pulley","Wheel","Ramp","Axle"],
correct:0
},

{
level:"Final Level: Earth Science",
question:"What causes Earth's seasons?",
answers:[
"Distance from Sun",
"Earth's tilted axis",
"Moon phases",
"Ocean currents"
],
correct:1
},

{
level:"Final Level: Earth Science",
question:"The outer core is mostly:",
answers:["Solid rock","Water","Liquid metal","Gas"],
correct:2
},

{
level:"Final Level: Earth Science",
question:"Condensation is part of the:",
answers:["Rock cycle","Water cycle","Carbon cycle","Nitrogen cycle"],
correct:1
},

{
level:"Final Level: Earth Science",
question:"What type of rock forms from cooled lava?",
answers:["Sedimentary","Metamorphic","Igneous","Fossil"],
correct:2
},

{
level:"Final Level: Earth Science",
question:"Earth rotates once every:",
answers:["365 days","12 hours","24 hours","7 days"],
correct:2
}

];

let questions = [];
let currentQuestion = 0;
let score = 0;
let timer;
let timeLeft = 120;

function shuffle(array){

    for(let i = array.length - 1; i > 0; i--){

        const j = Math.floor(Math.random() * (i + 1));

        [array[i], array[j]] = [array[j], array[i]];
    }

    return array;
}

function startGame(){

    document.getElementById("startScreen").style.display = "none";
    document.getElementById("endScreen").style.display = "none";
    document.getElementById("game").style.display = "flex";

    questions = shuffle([...allQuestions]);

    currentQuestion = 0;
    score = 0;
    timeLeft = 120;

    clearInterval(timer);

    startTimer();

    loadQuestion();
}

function restartGame(){

    startGame();

}

function startTimer(){

    document.getElementById("timer").innerText =
        "Time: " + timeLeft;

    timer = setInterval(()=>{

        timeLeft--;

        document.getElementById("timer").innerText =
            "Time: " + timeLeft;

        if(timeLeft <= 0){

            endGame(false);

        }

    },1000);

}

function loadQuestion(){

    const q = questions[currentQuestion];

    document.getElementById("levelDisplay").innerText =
        q.level;

    document.getElementById("question").innerText =
        q.question;

    document.getElementById("score").innerText =
        "Score: " + score + " / 200";

    document.getElementById("message").innerText = "";

    const answersDiv = document.getElementById("answers");

    answersDiv.innerHTML = "";

    q.answers.forEach((answer,index)=>{

        const btn = document.createElement("button");

        btn.innerText = answer;

        btn.onclick = ()=> checkAnswer(index);

        answersDiv.appendChild(btn);

    });

}

function checkAnswer(index){

    const q = questions[currentQuestion];

    if(index === q.correct){

        score += 10;

        document.getElementById("message").innerHTML =
            "✅ Correct! Door unlocked.";

    }else{

        timeLeft -= 5;

        document.getElementById("message").innerHTML =
            "❌ Incorrect! -5 seconds";

    }

    currentQuestion++;

    if(currentQuestion >= questions.length){

        endGame(true);

    }else{

        setTimeout(loadQuestion,1000);

    }

}

function endGame(win){

    clearInterval(timer);

    document.getElementById("game").style.display = "none";

    document.getElementById("endScreen").style.display = "flex";

    if(win){

        document.getElementById("endTitle").innerHTML =
            "🎉 You Escaped the Science Lab!";

        document.getElementById("endMessage").innerHTML =
            "Final Score: " + score +
            "<br><br>You completed all 20 MCAS science questions!";

    }else{

        document.getElementById("endTitle").innerHTML =
            "⏰ Time Ran Out!";

        document.getElementById("endMessage").innerHTML =
            "The lab locked before you escaped.<br><br>Final Score: " + score;

    }

}

</script>

</body>
</html>
